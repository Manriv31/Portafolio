<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ data.name }} — Portfolio</title>
    <meta name="description" content="{{ data.tagline }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Favicon: use static/favicon.ico (place your favicon at static/favicon.ico) -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <nav class="nav" id="nav">
        <div class="nav-inner">
            <a href="{{ url_for('index') }}" class="nav-logo">MR</a>
            <div class="nav-links">
                     {% for link in data.nav_links %}
                     <a href="{% if link.href[0] == '#' %}{{ url_for('index') }}{{ link.href }}{% else %}{{ link.href }}{% endif %}"
                         data-i18n="{{ link.i18n }}"
                         data-text-es="{{ link.label }}"
                         data-text-en="{{ link.label_en|default(link.label) }}">{{ link.label }}</a>
                     {% endfor %}
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-button" aria-label="Toggle theme" title="Toggle theme">
                    <!-- Sun icon (visible in dark mode) -->
                    <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                    <!-- Moon icon (visible in light mode) -->
                    <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
                <button id="lang-toggle" class="lang-button" aria-label="Toggle language" title="Toggle language">EN</button>
                <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
    <!-- i18next for client-side translations -->
    <script src="https://unpkg.com/i18next@21.9.1/dist/umd/i18next.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- Vercel Analytics -->
    <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/<unique-path>/script.js"></script>
</body>
</html>
