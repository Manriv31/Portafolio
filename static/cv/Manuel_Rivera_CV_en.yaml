        location: 
        summary:
        highlights:
          - 'Thesis: Protecting Smart Homes, Risks and Security Solutions in Domestic IoT.'

      - institution: Universidad Evangelica de El Salvador (UEES)
        area: Computer Engineering
        degree: B.S.
        date:
        start_date: 2016-01
        end_date: 2021-10
        location: San Salvador, El Salvador
        summary:
        highlights:
          - 'Thesis: Web Platform for Public Transportation Information in El Salvador (Busitosv).'
          - Recognition at the Technology Innovation Fair for the project "Intelligent Air Quality Monitoring Device"; project selected to participate in international technology innovation fairs in Honduras and Costa Rica.

    experience:
      - company: OE International - Banco Agricola
        position: Data & Observability Analyst
        date:
        start_date: 2021-11
        end_date: present
        location: San Salvador, El Salvador
        summary: >-
          Responsible for implementing monitoring checkpoints across Banco Agricola's critical applications and systems, applying the five-layer observability methodology to ensure high availability, early anomaly detection, and operational continuity. Performed data analysis by designing and maintaining ETL pipelines with Python to extract, transform, and deliver meaningful business metrics, enabling stakeholders to make informed decisions based on real-time and historical data. Complemented monitoring and analytics responsibilities with internal software development, building web-based tools and automation solutions that improved team efficiency and standardized operational workflows.
        highlights:
          - Played a key role in identifying and mitigating operational risks, contributing to the financial stability and security of the institution
          - Collaborated with cross-functional teams to develop and improve incident response protocols, ensuring rapid and effective response to detected anomalies
          - Led internal initiatives including ETL scheduling and orchestration on server, deployment of an internal Gitea repository, implementation of an internal Bookstack wiki, and configuration of efficient alerting through monitoring tool webhooks integrated with Microsoft Teams
          - Built internal web systems using Python with Flask and Django, applying secure coding practices.
  
      - company: Fosalud
        position: Full Stack Developer
        date:
        start_date: 2020-02
        end_date: 2021-12
        location: San Salvador, El Salvador
        summary: >-
          Led the development and deployment of a web-based system to manage health program statistics and key indicators, built with PHP (CakePHP), MySQL, JavaScript (jQuery), and CSS, with ZingChart for data visualization. Handled requirements analysis, architecture design, feature development, testing, and project documentation.
        highlights:
          - Delivered a production system currently in use by Fosalud's data entry team, unifying information and enabling efficient report generation.
          - Automated manual processes, streamlining daily tasks and improving data quality across the team.
         
      - company: Grupo Satelite
        position: QA Analyst
        date:
        start_date: 2019-11
        end_date: 2020-01
        location: San Salvador, El Salvador
        summary: >-
          Performed comprehensive QA testing on ERP software, focusing on user/role management and inventory administration. Conducted detailed manual and real-time testing to ensure system functionality, documenting issues and collaborating with the development team for resolution.
        highlights:
          - Contributed to automated testing scripts that improved the efficiency of the QA process
          - Integrated manual and automated testing approaches for more effective quality assurance
          - Worked with high-profile clients including Centro Cultural Salvadoreño, Pricesmart, and Save the Children

      - company: Brightness Developing Solutions - Fast Care
        position: Web Developer
        date:
        start_date: 2019-08
        end_date: 2019-12
        location: San Salvador, El Salvador
        summary: >-
          Developed and maintained PHP web applications for medical supply inventory management. Designed and optimized MySQL databases to improve query performance and data storage efficiency. Collaborated with the development team to implement new features aligned with business requirements.
        highlights:
          - Built robust inventory management systems ensuring reliable tracking of medical supplies.
          - Optimized database queries, improving application speed and overall performance.
          - Provided technical support, identifying bottlenecks and debugging issues to maintain software quality.

    skills:
