  sections:
    About Me:
      - Software Engineer with over 5 years of experience in web development, software engineering, and IT observability. Skilled in building full-stack web applications using Python (Django, Flask, FastAPI) and PHP (CakePHP, Laravel), from requirements analysis and database design to deployment and maintenance. Experienced in developing internal tools and management systems that streamline workflows, automate processes, and improve team productivity. Strong background in relational databases including MySQL, SQL Server, and PostgreSQL. Currently working as a Data & Observability Analyst in the banking sector, applying the five-layer observability methodology using tools such as Zabbix, Dynatrace, Grafana, ELK Stack, and Prometheus to monitor critical applications, identify operational risks, and ensure system reliability. Actively involved in incident response coordination and cross-team collaboration to strengthen monitoring protocols and reduce downtime. Holds a B.S. in Computer Engineering and a Master's in Cybersecurity. Adaptable, team-oriented, and committed to writing clean, secure, and maintainable code.

