  sections:
    Sobre mi:
      - Ingeniero de software con más de 5 años de experiencia en desarrollo web, ingeniería de software y observabilidad IT. Especializado en el desarrollo de aplicaciones web full-stack con Python (Django, Flask, FastAPI) y PHP (CakePHP, Laravel), desde el análisis de requisitos y el diseño de bases de datos hasta el despliegue y mantenimiento. Con experiencia en el desarrollo de herramientas internas y sistemas de gestión que optimizan flujos de trabajo, automatizan procesos y mejoran la productividad del equipo. Sólido conocimiento en bases de datos relacionales como MySQL, SQL Server y PostgreSQL. Actualmente trabaja como Analista de Datos y Observabilidad en el sector bancario, aplicando la metodología de observabilidad de cinco capas con herramientas como Zabbix, Dynatrace, Grafana, ELK Stack y Prometheus para monitorear aplicaciones críticas, identificar riesgos operativos y garantizar la confiabilidad del sistema. Activamente involucrado en la coordinación de respuesta a incidentes y la colaboración entre equipos para fortalecer los protocolos de monitoreo y reducir el tiempo de inactividad. Posee una Licenciatura en Ingeniería en Sistemas Computacionales y una Maestría en Ciberseguridad. Adaptable, orientado al trabajo en equipo y comprometido con la escritura de código limpio, seguro y mantenible. 
    education:
      - institution: Universidad Católica San Antonio de Murcia (UCAM)
        area: Ciberseguridad
        degree: Master
        date:
        start_date: 2024-05
        end_date: 2025-05
        location: San Salvador, El Salvador
        summary:
        highlights:
          - 'Tesis: Protección de hogares inteligentes — riesgos y soluciones de seguridad en el IoT doméstico.'

      - institution: Universidad Evangelica de El Salvador (UEES)
        area: Sistemas Computacionales
        degree: Ingeniería
        date:
        start_date: 2016-01
        end_date: 2021-10
        location: San Salvador, El Salvador
        summary:
        highlights:
          - 'Tesis: Plataforma web para información del transporte público en El Salvador (Busitosv).'
          - Reconocimiento en la Feria de Innovación Tecnológica por el proyecto "Dispositivo inteligente de monitoreo de la calidad del aire"; proyecto seleccionado para participar en ferias internacionales de innovación tecnológica en Honduras y Costa Rica.  
    experience:
      - company: OE International - Banco Agricola
        position: Analista de Observabilidad y Datos
        date:
        start_date: 2021-11
        end_date: present
        location: San Salvador, El Salvador
        summary: >-
          Responsable de implementar puntos de control de monitoreo en las aplicaciones y sistemas críticos de Banco Agrícola, aplicando la metodología de observabilidad de cinco capas para garantizar alta disponibilidad, detección temprana de anomalías y continuidad operativa. Realicé análisis de datos diseñando y manteniendo pipelines ETL con Python para extraer, transformar y entregar métricas comerciales significativas, permitiendo a los interesados tomar decisiones informadas basadas en datos en tiempo real e históricos. Complementé las responsabilidades de monitoreo y análisis con desarrollo de software interno, construyendo herramientas web y soluciones de automatización que mejoraron la eficiencia del equipo y estandarizaron los flujos de trabajo operativos.
        highlights:
          - Desempeñé un papel clave en la identificación y mitigación de riesgos operativos, contribuyendo a la estabilidad financiera y seguridad de la institución
          - Colaboré con equipos multifuncionales para desarrollar y mejorar los protocolos de respuesta a incidentes, asegurando una respuesta rápida y efectiva a las anomalías detectadas
          - Lideré iniciativas internas incluyendo la programación y orquestación de ETL en el servidor, el despliegue de un repositorio interno de Gitea, la implementación de un wiki interno de Bookstack y la configuración de alertas eficientes a través de webhooks de herramientas de monitoreo integradas con Microsoft Teams
          - Construí sistemas web internos utilizando Python con Flask y Django, aplicando prácticas de codificación segura.

      - company: Fosalud
        position: Desarrollador Full Stack
        date:
        start_date: 2020-02
        end_date: 2021-12
        location: San Salvador, El Salvador
        summary: >-
          Lideré el desarrollo y despliegue de un sistema web para gestionar estadísticas de programas de salud e indicadores clave, construido con PHP (CakePHP), MySQL, JavaScript (jQuery) y CSS, con ZingChart para visualización de datos. Me encargué del análisis de requisitos, diseño de arquitectura, desarrollo de funcionalidades, pruebas y documentación del proyecto.
        highlights:
          - Entregué un sistema en producción actualmente en uso por el equipo de ingreso de datos de Fosalud, unificando la información y permitiendo una generación de informes eficiente.
          - Automatizé procesos manuales, agilizando las tareas diarias y mejorando la calidad de los datos en todo el equipo.

      - company: Grupo Satelite
        position: Analista QA
        date:
        start_date: 2019-11
        end_date: 2020-01
        location: San Salvador, El Salvador
        summary: >-
          Realicé pruebas exhaustivas de QA en software ERP, centrándome en la gestión de usuarios/roles y la administración de inventarios. Realicé pruebas detalladas manuales y en tiempo real para garantizar la funcionalidad del sistema, documentando problemas y colaborando con el equipo de desarrollo para su resolución.
        highlights:
          - Contribuí a la creación de scripts de prueba automatizados que mejoraron la eficiencia del proceso de QA
          - Integré enfoques de prueba manual y automatizada para una garantía de calidad más efectiva
          - Trabajé con clientes de alto perfil, incluyendo Centro Cultural Salvadoreño, Pricesmart y Save the Children

      - company: Brightness Developing Solutions - Fast Care
        position: Desarrollador Web
        date:
        start_date: 2019-08
        end_date: 2019-12
        location: San Salvador, El Salvador
        summary: >-
          Desarrollé y mantuve aplicaciones web en PHP para la gestión de inventarios de suministros médicos. Diseñé y optimicé bases de datos MySQL para mejorar el rendimiento de las consultas y la eficiencia del almacenamiento de datos. Colaboré con el equipo de desarrollo para implementar nuevas funcionalidades alineadas con los requisitos del negocio.
        highlights:
          - Construí sistemas robustos de gestión de inventarios, asegurando un seguimiento confiable de los suministros médicos.
          - Optimicé consultas de bases de datos, mejorando la velocidad de la aplicación y el rendimiento general.
          - Proporcioné soporte técnico, identificando cuellos de botella y depurando problemas para mantener la calidad del software.

    skills:
      - label: Lenguajes de Programación
        details: Python, PHP, JavaScript, CSS
      - label: Frameworks y Bibliotecas
        details: Frameworks (Django, Flask, FastAPI, CakePHP, Laravel, Bootstrap), Bibliotecas de Python (Pandas, NumPy, Matplotlib), Bibliotecas de JavaScript (jQuery)
      - label: Infraestructura y Herramientas
        details: Linux, Windows, Docker, Git
      - label: Bases de Datos
        details: MySQL, SQL Server, PostgreSQL, SQLite3, MongoDB
      - label: Monitoreo y Observabilidad
        details: Zabbix, Dynatrace, Grafana, ELK Stack, Prometheus
    languages:
      - label: Español
        details: Nativo
      - label: Inglés
        details: Intermedio (B1)
